<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- ICON -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="/css/style.css">
  <title>Login - NovaPOS</title>
</head>

<body class="login-page">

  <div class="auth-wrapper">

    <div class="auth-container">

      <!-- LEFT -->
      <div class="auth-left">
        <div>
          <div class="brand">
            <img src="/assets/logo_pos.png" alt="Logo NovaPOS" class="logo">
            <h2>NovaPos</h2>
          </div>

          <span class="badge">⚡ Modern • Fast • Reliable</span>

          <h1>
            Modern cashier<br>
            system for your <span>business</span>
          </h1>

          <p class="desc">
            Manage sales, stock, and reports easily in one platform.
          </p>
        </div>

        <img src="/assets/kasir1.png" alt="POS System">

        <div class="features">
          <div>✔ Secure</div>
          <div>⚡ Fast</div>
          <div>📊 Analytics</div>
          <div>🎧 24/7 Support</div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="auth-right">

        <div class="form-card">

          <h2>Welcome Back! 👋</h2>
          <p class="sub">Sign in to continue to NovaPOS</p>

          <form id="loginForm">

            <label>Email</label>
            <div class="input-group">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <label>Password</label>
            <div class="input-group">
              <i class="fa-solid fa-lock"></i>
              <input type="password" id="password" placeholder="Enter your password" required>
              <i class="fa-regular fa-eye toggle" onclick="togglePassword()"></i>
            </div>

            <div class="row-between">
              <label><input type="checkbox"> Remember me</label>
            </div>

            <button type="submit" class="btn-primary">
              <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>

          </form>

          <div class="divider">or sign in with</div>


          <button class="btn-demo">
            <i class="fa-regular fa-user"></i>
            Login as Demo
          </button>

          <p class="bottom-text">
            Don't have an account? <a href="#">Contact administrator</a>
          </p>

        </div>

      </div>

    </div>

  </div>

  <script src="/js/script.js"></script>
</body>
</html>
