<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <title>NovaPos</title>
</head>

<body class="pos-page">

  <div class="pos-wrapper">

    <div class="topbar">
      <div class="logo">
        <img src="assets/logo1.png" alt="NovaPos Logo">
      </div>

      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search product...">
      </div>

      <div class="top-actions">
        <button class="history-btn">
          <i class="fa-solid fa-clock-rotate-left"></i> History
        </button>

        <div class="user-dropdown">
          <div class="user" onclick="toggleDropdown()">
            <i class="fa-regular fa-user"></i> Indah
          </div>

          <div class="dropdown-menu" id="dropdownMenu">
            <button onclick="logout()">Logout</button>
          </div>
        </div>
      </div>

      <button class="cart-toggle" onclick="toggleCart()">
        <i class="fa-solid fa-cart-shopping"></i>
      </button>
    </div>

    <div class="filter">
      <button class="active" onclick="filterProduct(event,'all')">
        <i class="fa-solid fa-border-all"></i> All
      </button>

      <button onclick="filterProduct(event, 'makanan')">
        <i class="fa-solid fa-bowl-food"></i> Food
      </button>

      <button onclick="filterProduct(event, 'minuman')">
        <i class="fa-solid fa-mug-hot"></i> Drinks
      </button>

      <button onclick="filterProduct(event, 'snack')">
        <i class="fa-solid fa-cookie-bite"></i> Snacks
      </button>
    </div>

    <div class="container">
      <div class="products">
        <div class="product-list" id="productList"></div>
      </div>

      <div class="cart">

        <div class="cart-header">
          <h3>Cart</h3>
          <i class="fa-solid fa-trash"></i>
        </div>

        <div id="cartItems"></div>
        <div class="summary">

          <div class="row">
            <span>Subtotal</span>
            <span id="subtotal">Rp 0</span>
          </div>

          <div class="row">
            <span>Discount</span>
            <div class="diskon-box">
              <input type="number" id="diskon" value="0">
              <span>%</span>
            </div>
          </div>

          <hr>

          <div class="total">
            <span>Total</span>
            <h2 id="total">Rp 0</h2>
          </div>

          <input type="number" id="pay" placeholder="Cash received">

          <p>Change: <span id="change">Rp 0</span></p>

          <div class="actions">
            <button onclick="resetCart()" class="reset">
              Reset
            </button>

            <button onclick="checkout()" class="pay">
              Pay
            </button>
          </div>

        </div>

      </div>

    </div>

    <div class="pos-footer">
      <div class="footer-item">
        <span>🕒 Time</span>
        <h4 id="liveClock">00:00:00</h4>
      </div>

      <div class="footer-item">
        <span>💰 Today Sales</span>
        <h4 id="todaySales">Rp 0</h4>
      </div>

      <div class="footer-item">
        <span>🧾 Orders</span>
        <h4 id="totalOrders">0</h4>
      </div>
    </div>

  </div>
  <script src="/js/script.js"></script>
</body>

<div id="receiptModal" class="pos-page receipt-modal">
  <div class="receipt-box">

    <div class="receipt-header">
      <h2>NovaPos</h2>
      <span id="receiptDate"></span>
      <p id="receiptCashier"></p>
    </div>

    <div class="receipt-items" id="receiptItems"></div>

    <div class="receipt-summary">
      <div>
        <span>Total</span>
        <b id="receiptTotal"></b>
      </div>
      <div>
        <span>Cash</span>
        <b id="receiptPay"></b>
      </div>
      <div>
        <span>Change</span>
        <b id="receiptChange"></b>
      </div>
    </div>

    <div class="receipt-actions">
      <button class="print-btn" onclick="printReceipt()">
        <i class="fa-solid fa-print"></i> Print
      </button>
      <button class="close-btn" onclick="closeReceipt()">
        Close
      </button>
    </div>

  </div>
</div>

</html>
